<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteers Club · Invitation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="invite-card">
      <div class="tag">PRIVATE INVITATION</div>

      <h1>Volunteers Club<br><span>GoodBye Party</span></h1>

      <p class="hello">
        Hello, <strong id="guestName">guest</strong>!
      </p>

      <p class="text">
        Join us for a special night with great people, music, an amazing atmosphere, and moments to remember.
      </p>

      <div class="details">
        <div>
          <span>Date</span>
          <strong>28 April 2026</strong>
        </div>
        <div>
          <span>Time</span>
          <strong>19:00</strong>
        </div>
        <div>
          <span>Place</span>
          <strong>Astana, Kazakhstan</strong>
        </div>
      </div>

      <div class="countdown">
        <span id="days">00</span>d :
        <span id="hours">00</span>h :
        <span id="minutes">00</span>m :
        <span id="seconds">00</span>s
      </div>

      <div class="buttons">
        <a class="btn primary" href="https://www.google.com/maps?q=Nazarbayev+University" target="_blank">Open location</a>
      </div>

      <p class="footer">Dress code: free</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
